services:
  # FastAPI Backend (using Supabase for database)
  backend:
    
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketing_backend
    environment:
      # Supabase Configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:[password]@[host]:5432/postgres}
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-your-service-role-key}
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - ticketing_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: ticketing_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - ticketing_network

networks:
  ticketing_network:
    driver: bridge
